<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1280, initial-scale=1" />
  <title>Assay — Factor Research</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topnav" id="topnav">
    <a class="topnav-logo" href="#/dashboard" data-i18n-aria="nav.home" aria-label="Assay home">
      <span class="topnav-diamond" aria-hidden="true">&#9670;</span>
      <span class="topnav-wordmark">ASSAY</span>
      <span class="topnav-version" id="app-version" title="Engine version"></span>
    </a>

    <nav class="topnav-tabs" aria-label="Primary">
      <a class="topnav-tab" data-route="#/dashboard" data-i18n="nav.dashboard" href="#/dashboard">Dashboard</a>
      <a class="topnav-tab" data-route="#/library" data-i18n="nav.library" href="#/library">Factor Library</a>
      <a class="topnav-tab" data-route="#/factor" data-i18n="nav.factor" href="#/factor">Single Factor Test</a>
      <a class="topnav-tab" data-route="#/combination" data-i18n="nav.combination" href="#/combination">Factor Combination</a>
      <a class="topnav-tab" data-route="#/portfolio" data-i18n="nav.portfolio" href="#/portfolio">Portfolio Backtest</a>
      <a class="topnav-tab" data-route="#/chart" data-i18n="nav.chart" href="#/chart">Chart</a>
      <a class="topnav-tab" data-route="#/docs" data-i18n="nav.docs" href="#/docs">Docs</a>
      <a class="topnav-tab" data-route="#/data" data-i18n="nav.data" href="#/data">Data Manager</a>
    </nav>

    <div class="topnav-controls">
      <label class="topnav-field">
        <span class="topnav-field-label" data-i18n="ctrl.universe">Universe</span>
        <select id="universe-select" class="select" aria-label="Universe"></select>
      </label>

      <label class="topnav-field">
        <span class="topnav-field-label" data-i18n="ctrl.period">Period</span>
        <select id="period-select" class="select" aria-label="Period preset">
          <option value="1Y">1Y</option>
          <option value="3Y">3Y</option>
          <option value="5Y">5Y</option>
          <option value="custom" data-i18n="ctrl.custom">Custom</option>
        </select>
      </label>

      <div class="topnav-field topnav-period-custom" id="period-custom" hidden>
        <input type="date" id="period-start" class="input input-date" aria-label="Period start" />
        <span class="topnav-period-dash" aria-hidden="true">&ndash;</span>
        <input type="date" id="period-end" class="input input-date" aria-label="Period end" />
      </div>

      <button type="button" id="theme-toggle" class="lang-toggle" data-i18n-title="ctrl.themeTitle"
              title="Switch skin">Retro</button>

      <button type="button" id="lang-toggle" class="lang-toggle" data-i18n="ctrl.lang"
              data-i18n-title="ctrl.langTitle" title="切换到中文">中文</button>

      <button type="button" id="status-dot" class="status-dot status-dot--unknown"
              aria-label="System status" title="System status: unknown"></button>
    </div>
  </header>

  <main id="app" class="app-main" tabindex="-1"></main>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
